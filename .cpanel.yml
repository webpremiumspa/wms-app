---
deployment:
  tasks:
    # ─── 1. Backend → wms.chimuelo.cl/backend/ ───────────────────────────────
    - /usr/bin/rsync -a --delete --exclude='node_modules' --exclude='.env' backend/ $HOME/wms.chimuelo.cl/backend/

    # ─── 2. Backend: instalar deps y generar cliente Prisma ──────────────────
    - /bin/bash -lc "source $HOME/nodevenv/wms.chimuelo.cl/backend/20/bin/activate && cd $HOME/wms.chimuelo.cl/backend && npm ci --omit=dev && npx prisma generate"

    # ─── 3. Frontend: instalar deps y build ──────────────────────────────────
    # GOMAXPROCS=1 limita los threads de Go (esbuild) para no exceder el límite
    # de procesos que impone CloudLinux en hosting compartido.
    - /bin/bash -lc "source $HOME/nodevenv/wms.chimuelo.cl/backend/20/bin/activate && cd frontend && npm ci && GOMAXPROCS=1 npx vite build"

    # ─── 4. Frontend dist → raíz del subdominio ──────────────────────────────
    - /usr/bin/rsync -a frontend/dist/ $HOME/wms.chimuelo.cl/

    - echo "Deploy OK. Restart la app Node si hubo cambios de backend."
