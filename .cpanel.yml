---
deployment:
  tasks:
    # cPanel/CloudLinux necesita una carpeta física para el Application URL /api.
    # En algunos hosts también espera que api/.htaccess exista antes de guardar
    # la app. touch no pisa el bloque Passenger si cPanel ya lo generó.
    - /bin/mkdir -p $HOME/wms.chimuelo.cl/api
    - /bin/touch $HOME/wms.chimuelo.cl/api/.htaccess
    - /bin/bash -lc 'if [ ! -s "$HOME/wms.chimuelo.cl/api/.htaccess" ]; then printf "%s\n" "# DO NOT REMOVE. CLOUDLINUX PASSENGER CONFIGURATION BEGIN" "PassengerAppRoot \"$HOME/wms.chimuelo.cl/backend\"" "PassengerBaseURI \"/api\"" "PassengerNodejs \"$HOME/nodevenv/wms.chimuelo.cl/backend/20/bin/node\"" "PassengerAppType node" "PassengerStartupFile server.js" "# DO NOT REMOVE. CLOUDLINUX PASSENGER CONFIGURATION END" > "$HOME/wms.chimuelo.cl/api/.htaccess"; fi'

    # ─── 1. Backend → wms.chimuelo.cl/backend/ ───────────────────────────────
    - /usr/bin/rsync -a --delete --exclude='node_modules' --exclude='.env' backend/ $HOME/wms.chimuelo.cl/backend/

    # ─── 2. Backend: instalar deps y generar cliente Prisma ──────────────────
    - /bin/bash -lc "source $HOME/nodevenv/wms.chimuelo.cl/backend/20/bin/activate && cd $HOME/wms.chimuelo.cl/backend && npm ci --omit=dev && ./node_modules/.bin/prisma generate && node -e \"import('./src/app.js').then(() => console.log('APP_IMPORT_OK'))\""

    # ─── 3. Frontend: instalar deps y build ──────────────────────────────────
    # GOMAXPROCS=1 limita los threads de Go (esbuild) para no exceder el límite
    # de procesos que impone CloudLinux en hosting compartido.
    - /bin/bash -lc "source $HOME/nodevenv/wms.chimuelo.cl/backend/20/bin/activate && cd frontend && npm ci && GOMAXPROCS=1 npx vite build"

    # ─── 4. Frontend dist → raíz del subdominio ──────────────────────────────
    # No copiamos .htaccess: cPanel/Passenger escribe ahí las directivas que
    # enrutan /api hacia la app Node. Sobrescribirlo deja /api en 404 LiteSpeed.
    - /usr/bin/rsync -a --exclude='.htaccess' frontend/dist/ $HOME/wms.chimuelo.cl/

    - echo "Deploy OK. Restart la app Node si hubo cambios de backend."
